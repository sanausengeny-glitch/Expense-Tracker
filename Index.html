<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1 id="main-heading">My Budget Tracker</h1>
        <p class="subtitle">
            Track your income and expenses in one place.
        </p>
    </header>

    <!-- Add Expense Section -->
    <section class="add-expense-section">
        <h2>Add Expense</h2>

        <input
            type="text"
            id="expense-name"
            placeholder="Expense Name">

        <input
            type="number"
            id="expense-amount"
            placeholder="Amount">

        <input
            type="text"
            id="expense-category"
            placeholder="Category">
    </section>

    <!-- Expenses Section -->
    <section class="expenses-section">
        <h2>Your Expenses</h2>
        <p>No expenses yet.</p>
    </section>

</body>
</html>
